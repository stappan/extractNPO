<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>extractNPO</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,400&family=DM+Sans:wght@300;400;500;600&display=swap');

  :root {
    --bg: #f5f3ee;
    --surface: #ffffff;
    --surface2: #f0ede6;
    --border: #d8d2c8;
    --text: #1a1814;
    --text2: #6b6459;
    --accent: #2d5a3d;
    --accent2: #4a8c62;
    --accent-light: #e8f0eb;
    --warn: #7a3b1e;
    --warn-light: #fdf0ea;
    --mono: 'DM Mono', monospace;
    --sans: 'DM Sans', sans-serif;
    --radius: 6px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--sans);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.5;
    display: flex;
    flex-direction: column;
  }

  .app { display: flex; flex: 1; }

  /* ── SIDEBAR ──────────────────────────────────────────── */
  .sidebar {
    width: 220px;
    min-width: 220px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 24px 0;
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow-y: auto;
  }
  .sidebar-logo {
    padding: 0 20px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .sidebar-logo h1 {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text2);
    font-weight: 500;
    line-height: 1.5;
  }
  .sidebar-logo span {
    font-size: 18px;
    font-weight: 600;
    color: var(--accent);
    display: block;
    margin-bottom: 2px;
    letter-spacing: -0.01em;
  }
  .nav-section { padding: 0 12px; margin-bottom: 8px; }
  .nav-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text2);
    padding: 6px 8px 4px;
  }
  .nav-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 8px;
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 13px;
    color: var(--text2);
    transition: all 0.12s;
    user-select: none;
  }
  .nav-item:hover { background: var(--surface2); color: var(--text); }
  .nav-item.active { background: var(--accent-light); color: var(--accent); font-weight: 500; }
  .nav-item .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    border: 1.5px solid currentColor;
    flex-shrink: 0;
  }
  .sidebar-pop-list {
    padding: 0 12px;
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid var(--border);
  }
  .sidebar-pop-label {
    font-family: var(--mono);
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--text2);
    padding: 6px 8px 4px;
  }
  .pop-chip {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 5px 8px;
    border-radius: var(--radius);
    font-size: 12px;
    cursor: pointer;
    color: var(--text2);
    transition: background 0.12s;
  }
  .pop-chip:hover { background: var(--surface2); }
  .pop-chip.current { color: var(--accent); font-weight: 500; background: var(--accent-light); }
  .pop-chip-num {
    font-family: var(--mono);
    font-size: 10px;
    background: var(--surface2);
    color: var(--text2);
    padding: 1px 5px;
    border-radius: 3px;
  }
  .pop-chip.current .pop-chip-num { background: var(--accent); color: white; }

  /* ── MAIN ─────────────────────────────────────────────── */
  .main { flex: 1; padding: 40px 48px; max-width: 820px; }

  .section-header { margin-bottom: 28px; }
  .section-tag {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 6px;
  }
  .section-title {
    font-size: 22px;
    font-weight: 600;
    letter-spacing: -0.02em;
    color: var(--text);
  }
  .section-sub { font-size: 13px; color: var(--text2); margin-top: 4px; }

  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 24px;
    margin-bottom: 16px;
  }
  .card-title {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text2);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .card-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }

  .field-row { margin-bottom: 16px; }
  .field-row:last-child { margin-bottom: 0; }
  .field-label { display: block; font-size: 12px; font-weight: 500; color: var(--text2); margin-bottom: 5px; }
  .field-hint { font-size: 11px; color: var(--text2); margin-top: 3px; opacity: 0.7; }

  input[type=text], textarea, select {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    background: var(--bg);
    color: var(--text);
    outline: none;
    transition: border-color 0.15s;
  }
  input[type=text]:focus, textarea:focus, select:focus {
    border-color: var(--accent2);
    background: var(--surface);
  }
  textarea { resize: vertical; min-height: 72px; }

  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

  /* ── CHIPS ───────────────────────────────────────────── */
  .chip-grid { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 4px; }
  .chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 5px 12px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    cursor: pointer;
    user-select: none;
    transition: all 0.12s;
    color: var(--text2);
    background: var(--surface);
  }
  .chip:hover { border-color: var(--accent2); color: var(--text); }
  .chip.selected { background: var(--accent); border-color: var(--accent); color: white; }

  .yesno-row {
    display: flex;
    gap: 10px;
    margin-top: 6px;
  }
  .yesno-btn {
    flex: 1;
    padding: 12px;
    border: 1.5px solid var(--border);
    border-radius: var(--radius);
    text-align: center;
    cursor: pointer;
    font-size: 14px;
    font-weight: 500;
    transition: all 0.15s;
    color: var(--text2);
    background: var(--surface);
    user-select: none;
  }
  .yesno-btn:hover { border-color: var(--accent2); color: var(--text); }
  .yesno-btn.selected-yes { background: var(--accent); border-color: var(--accent); color: white; }
  .yesno-btn.selected-no  { background: #5c3a2a; border-color: #5c3a2a; color: white; }

  /* ── PRESET CHIPS ────────────────────────────────────── */
  .preset-row { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 8px; }
  .preset-chip {
    padding: 3px 9px;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 11px;
    cursor: pointer;
    background: var(--surface);
    color: var(--text2);
    font-family: var(--mono);
    transition: all 0.12s;
  }
  .preset-chip:hover { border-color: var(--accent2); color: var(--accent); background: var(--accent-light); }

  /* ── MODIFIER CHIPS ──────────────────────────────────── */
  .modifier-chip {
    padding: 3px 10px;
    border: 1px solid var(--border);
    border-radius: 12px;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.12s;
    color: var(--text2);
    background: var(--surface);
  }
  .modifier-chip.selected { background: #5c4a2a; border-color: #5c4a2a; color: white; }

  /* ── FEATURE / LOCATION CARDS ────────────────────────── */
  .feature-list { display: flex; flex-direction: column; gap: 10px; }

  .loc-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px;
    display: grid;
    grid-template-columns: 1fr auto;
    gap: 10px;
    align-items: start;
  }
  .loc-card input { background: var(--surface); }

  .gene-method-group {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    margin-bottom: 12px;
    overflow: hidden;
  }
  .gene-method-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }
  .gene-method-header select { background: var(--surface2); max-width: 280px; }
  .gene-entries { padding: 10px 14px; display: flex; flex-direction: column; gap: 8px; }

  .gene-entry-row {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 8px;
    align-items: center;
  }
  .gene-entry-row input { background: var(--surface); }
  .modifier-row { display: flex; gap: 5px; flex-wrap: wrap; margin-top: 4px; }

  .add-btn {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 14px;
    border: 1.5px dashed var(--border);
    border-radius: var(--radius);
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    background: none;
    font-family: var(--sans);
    transition: all 0.12s;
    margin-top: 8px;
  }
  .add-btn:hover { border-color: var(--accent2); color: var(--accent); background: var(--accent-light); }
  .add-btn-sm {
    font-size: 11px;
    padding: 4px 10px;
    border: 1px dashed var(--border);
    border-radius: var(--radius);
    cursor: pointer;
    color: var(--text2);
    background: none;
    font-family: var(--sans);
    transition: all 0.12s;
  }
  .add-btn-sm:hover { border-color: var(--accent2); color: var(--accent); }

  .remove-btn {
    background: none;
    border: none;
    color: var(--text2);
    cursor: pointer;
    font-size: 16px;
    padding: 4px 6px;
    line-height: 1;
    border-radius: 3px;
    transition: all 0.12s;
  }
  .remove-btn:hover { background: var(--warn-light); color: var(--warn); }

  .feat-label { font-size: 10px; font-weight: 500; color: var(--text2); margin-bottom: 3px; }

  /* ── BUTTONS ─────────────────────────────────────────── */
  .btn-row { display: flex; gap: 10px; margin-top: 32px; align-items: center; flex-wrap: wrap; }
  .btn {
    padding: 10px 22px;
    border-radius: var(--radius);
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    border: none;
    transition: all 0.15s;
  }
  .btn-primary { background: var(--accent); color: white; }
  .btn-primary:hover { background: var(--accent2); }
  .btn-secondary { background: var(--surface); color: var(--text); border: 1px solid var(--border); }
  .btn-secondary:hover { background: var(--surface2); }
  .btn-ghost { background: none; color: var(--text2); border: none; padding: 10px 12px; }
  .btn-ghost:hover { color: var(--text); }
  .btn-export { background: #2b4a6e; color: white; margin-left: auto; }
  .btn-export:hover { background: #3a6091; }

  /* ── REVIEW TABLE ────────────────────────────────────── */
  .review-wrap { overflow-x: auto; }
  .review-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 12px;
    margin-top: 4px;
  }
  .review-table th {
    text-align: left;
    padding: 8px 10px;
    background: var(--surface2);
    border-bottom: 2px solid var(--border);
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--text2);
    white-space: nowrap;
    position: sticky;
    top: 0;
  }
  .review-table td { padding: 7px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .review-table tr:last-child td { border-bottom: none; }
  .review-table tr:hover td { background: var(--surface2); }
  .rel-badge {
    font-family: var(--mono);
    font-size: 10px;
    padding: 1px 6px;
    border-radius: 3px;
    background: var(--accent-light);
    color: var(--accent);
    white-space: nowrap;
    display: inline-block;
  }
  .method-badge { font-size: 10px; color: var(--text2); font-style: italic; }
  .pop-section-row td {
    background: var(--accent);
    color: white;
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    padding: 6px 10px;
  }

  .notice {
    background: var(--accent-light);
    border: 1px solid #c5d9cb;
    border-radius: var(--radius);
    padding: 10px 14px;
    font-size: 12px;
    color: var(--accent);
    margin-bottom: 16px;
  }

  .section-divider {
    border: none;
    border-top: 1px solid var(--border);
    margin: 20px 0;
  }

  select option { background: white; }

  /* ── SESSION BAR ─────────────────────────────────────── */
  .session-bar {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 20px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    font-size: 11px;
    color: var(--text2);
    flex-wrap: wrap;
  }
  .session-bar-label {
    font-family: var(--mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text2);
    margin-right: 4px;
  }
  .session-btn {
    padding: 4px 11px;
    border-radius: 4px;
    font-size: 11px;
    font-family: var(--sans);
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text2);
    transition: all 0.12s;
    white-space: nowrap;
  }
  .session-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--accent2); }
  .session-btn.primary { background: var(--accent); color: white; border-color: var(--accent); }
  .session-btn.primary:hover { background: var(--accent2); }
  .session-status {
    font-size: 11px;
    color: var(--text2);
    margin-left: auto;
    font-style: italic;
  }
  .session-status.ok  { color: var(--accent); }
  .session-status.err { color: var(--warn); }

  .restore-banner {
    background: #fffbea;
    border-bottom: 1px solid #e8d870;
    padding: 10px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12px;
    color: #5a4a00;
  }
  .restore-banner strong { font-weight: 600; }
  .restore-banner .btn-row { margin: 0; }

  /* ── POPULATION COLORS ───────────────────────────────── */
  .pop-color-bar {
    height: 4px;
    border-radius: 4px 4px 0 0;
    margin: -24px -24px 20px -24px;
  }
  .form-card.pop-tinted { border-top-width: 3px; }

  /* sidebar chip colors */
  .pop-chip.current.c0 { color: #1e5c4a; background: #e0f0eb; }
  .pop-chip.current.c1 { color: #4a3a1e; background: #f0e8d8; }
  .pop-chip.current.c2 { color: #2a3f6e; background: #dde6f5; }
  .pop-chip.current.c3 { color: #5c2a4a; background: #f0dce8; }
  .pop-chip.current.c4 { color: #3a5c1e; background: #e2f0d8; }
  .pop-chip.current.c5 { color: #5c3a1e; background: #f0e2d0; }
  .pop-chip.current.c6 { color: #1e4a5c; background: #d8eaf0; }
  .pop-chip.current.c7 { color: #4a1e5c; background: #ecddf5; }

  /* top nav chip colors */
  .chip.selected.c0 { background: #2d7a5e; border-color: #2d7a5e; }
  .chip.selected.c1 { background: #7a5a1e; border-color: #7a5a1e; }
  .chip.selected.c2 { background: #2a4a8e; border-color: #2a4a8e; }
  .chip.selected.c3 { background: #7a2a5c; border-color: #7a2a5c; }
  .chip.selected.c4 { background: #4a7a1e; border-color: #4a7a1e; }
  .chip.selected.c5 { background: #7a4a1e; border-color: #7a4a1e; }
  .chip.selected.c6 { background: #1e5c7a; border-color: #1e5c7a; }
  .chip.selected.c7 { background: #5c1e7a; border-color: #5c1e7a; }

  /* card left-border tint */
  .form-card.c0 { border-left: 3px solid #2d7a5e; }
  .form-card.c1 { border-left: 3px solid #7a5a1e; }
  .form-card.c2 { border-left: 3px solid #2a4a8e; }
  .form-card.c3 { border-left: 3px solid #7a2a5c; }
  .form-card.c4 { border-left: 3px solid #4a7a1e; }
  .form-card.c5 { border-left: 3px solid #7a4a1e; }
  .form-card.c6 { border-left: 3px solid #1e5c7a; }
  .form-card.c7 { border-left: 3px solid #5c1e7a; }

  /* section tag color per pop */
  .section-tag.c0 { color: #2d7a5e; }
  .section-tag.c1 { color: #7a5a1e; }
  .section-tag.c2 { color: #2a4a8e; }
  .section-tag.c3 { color: #7a2a5c; }
  .section-tag.c4 { color: #4a7a1e; }
  .section-tag.c5 { color: #7a4a1e; }
  .section-tag.c6 { color: #1e5c7a; }
  .section-tag.c7 { color: #5c1e7a; }

  /* pop header bar in review table */
  .pop-section-row.c0 td { background: #2d7a5e; }
  .pop-section-row.c1 td { background: #7a5a1e; }
  .pop-section-row.c2 td { background: #2a4a8e; }
  .pop-section-row.c3 td { background: #7a2a5c; }
  .pop-section-row.c4 td { background: #4a7a1e; }
  .pop-section-row.c5 td { background: #7a4a1e; }
  .pop-section-row.c6 td { background: #1e5c7a; }
  .pop-section-row.c7 td { background: #5c1e7a; }
</style>
</head>
<body>
<div id="restore-banner" class="restore-banner" style="display:none">
  <span>📂 <strong>Unsaved session found</strong> — would you like to restore your previous work?</span>
  <button class="session-btn primary" onclick="restoreFromLocal()">Restore session</button>
  <button class="session-btn" onclick="dismissRestore()">Start fresh</button>
</div>

<div style="display:flex;flex-direction:column;flex:1;min-height:0;">
<div class="session-bar">
  <span class="session-bar-label">Session</span>
  <button class="session-btn primary" onclick="saveSession()">⬇ Save session</button>
  <button class="session-btn" onclick="triggerLoadSession()">⬆ Load session</button>
  <button class="session-btn" onclick="newSession()" style="color:var(--warn);border-color:#d8b8a8;">✕ New session</button>
  <input type="file" id="session-file-input" accept=".json" style="display:none" onchange="loadSessionFile(event)">
  <span class="session-status" id="session-status"></span>
</div>

<div class="app">

<!-- ── SIDEBAR ──────────────────────────────────────── -->
<nav class="sidebar">
  <div class="sidebar-logo">
    <span>extractNPO</span>
    <h1>Cell Type<br>Annotation Tool</h1>
  </div>
  <div class="nav-section">
    <div class="nav-label">Paper</div>
    <div class="nav-item" id="nav-paper" onclick="goSection('paper')"><span class="dot"></span>Paper metadata</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">Cell Populations</div>
    <div class="nav-item" id="nav-identity"  onclick="goSection('identity')"><span class="dot"></span>Identity</div>
    <div class="nav-item" id="nav-circuit"   onclick="goSection('circuit')"><span class="dot"></span>Circuit &amp; Physiology</div>
    <div class="nav-item" id="nav-location"  onclick="goSection('location')"><span class="dot"></span>Location &amp; Morphology</div>
    <div class="nav-item" id="nav-molecular" onclick="goSection('molecular')"><span class="dot"></span>Molecular Profile</div>
    <div class="nav-item" id="nav-notes"     onclick="goSection('notes')"><span class="dot"></span>Notes &amp; Evidence</div>
  </div>
  <div class="nav-section">
    <div class="nav-label">Output</div>
    <div class="nav-item" id="nav-review" onclick="goSection('review')"><span class="dot"></span>Review &amp; Export</div>
  </div>
  <div class="sidebar-pop-list">
    <div class="sidebar-pop-label">Populations</div>
    <div id="pop-chips"></div>
    <div class="pop-chip" onclick="addPopulation()" style="color:var(--accent2);font-size:12px;">＋ add population</div>
  </div>
</nav>

<!-- ── MAIN ─────────────────────────────────────────── -->
<main class="main" id="main-content"></main>

</div>
<script>
// ═══════════════════════════════════════════════════════════
// CONFIG  — IRI lookup tables, invisible to researcher
// ═══════════════════════════════════════════════════════════
const IRI = {
  species: {
    'mouse':      { iri:'http://purl.obolibrary.org/obo/NCBITaxon_10090', npo:'ilxtr:hasInstanceInTaxon' },
    'human':      { iri:'http://purl.obolibrary.org/obo/NCBITaxon_9606',  npo:'ilxtr:hasInstanceInTaxon' },
    'macaque':    { iri:'http://purl.obolibrary.org/obo/NCBITaxon_9544',  npo:'ilxtr:hasInstanceInTaxon' },

let state = {

  currentPopIndex: 0,
  paper: { citation:'', doi:'', dataAvailability:'', figureNote:'', firstAuthor:'', year:'', sameSpecies:null, sharedSpecies:[] },
  populations: [],

function newPop() {
  return {
    id: Date.now() + Math.random(),
    // identity
    name: '', localLabel: '', region: '', species: [],

    isSensory: null,   // true/false/null
    physiology: [],

    ntOther: '',

    molecularGroups: [],  // [{method, genes:[{name,modifier}], proteins:[{name,modifier}], creLines:[{name}]}]
    // notes
    populationNote: '',
  };
}

state.populations.push(newPop());

// ═══════════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════════
function render() {
  updateSidebar();
  const main = document.getElementById('main-content');
  const s = state.currentSection;
  if      (s==='paper')    main.innerHTML = renderPaper();
  else if (s==='identity') main.innerHTML = renderIdentity();
  else if (s==='circuit')  main.innerHTML = renderCircuit();
  else if (s==='location') main.innerHTML = renderLocation();
  else if (s==='molecular')main.innerHTML = renderMolecular();
  else if (s==='notes')    main.innerHTML = renderNotes();
  else if (s==='review')   main.innerHTML = renderReview();
}

function colorClass(i) {
  // only assign colors when there's more than one population
  return state.populations.length > 1 ? 'c' + (i % 8) : '';
}

function updateSidebar() {
  ['paper','identity','circuit','location','molecular','notes','review'].forEach(id => {
    const el = document.getElementById('nav-'+id);
    if (el) el.classList.toggle('active', state.currentSection===id);
  });
  const c = document.getElementById('pop-chips');
  const multiPop = state.populations.length > 1;
  c.innerHTML = state.populations.map((p,i) => {
    const cc = colorClass(i);
    return `<div class="pop-chip ${i===state.currentPopIndex?'current':''} ${cc}" onclick="setPopulation(${i})" style="position:relative;">
      <span>${p.localLabel||p.name||'Pop '+(i+1)}</span>
      <span class="pop-chip-num">${i+1}</span>
      ${multiPop ? `<span onclick="event.stopPropagation();removePopulation(${i})" title="Remove population"
        style="margin-left:4px;opacity:0.5;cursor:pointer;font-size:11px;" onmouseover="this.style.opacity=1" onmouseout="this.style.opacity=0.5">✕</span>` : ''}
    </div>`;
  }).join('');
}

function goSection(s) { saveCurrent(); state.currentSection=s; render(); window.scrollTo(0,0); }
function setPopulation(i) { saveCurrent(); state.currentPopIndex=i; render(); window.scrollTo(0,0); }
function addPopulation() {
  saveCurrent();
  state.populations.push(newPop());
  state.currentPopIndex = state.populations.length-1;
  state.currentSection = 'identity';
  render(); window.scrollTo(0,0);
}

function saveCurrent() {
  const s = state.currentSection;
  const pop = cp();
  const gv = id => { const el=document.getElementById(id); return el?el.value.trim():''; };

  if (s==='paper') {
    state.paper.citation = gv('f-citation');
    state.paper.doi      = gv('f-doi');
    state.paper.dataAvailability = gv('f-data');
    state.paper.figureNote = gv('f-figure');
    const sso = gv('f-shared-species-other');
    if (sso && !(state.paper.sharedSpecies||[]).includes(sso)) {
      if (!state.paper.sharedSpecies) state.paper.sharedSpecies=[];
      state.paper.sharedSpecies.push(sso);
    }
  }
  else if (s==='identity') {
    pop.name = gv('f-name');
    pop.localLabel = pop.name;
    pop.region = gv('f-region');
    const so = gv('f-species-other');
    if (so && !pop.species.includes(so)) pop.species.push(so);
  }
  else if (s==='circuit') {
    const po = gv('f-physio-other');
    if (po && !pop.physiology.includes(po)) pop.physiology.push(po);
  }
  else if (s==='location') {
    pop.somaLocation = gv('f-somaLoc');
    const eo = gv('f-ending-other');
    if (eo && !pop.endingType.includes(eo)) pop.endingType.push(eo);
    // ntOther now handled via addOtherToArr into neurotransmitters array
  }
  else if (s==='notes') {
    pop.populationNote = gv('f-popnote');
  }
}

// MUTATION HELPERS
// ═══════════════════════════════════════════════════════════
function cp() { return state.populations[state.currentPopIndex]; }

function toggleArr(field, val) {
  const pop = cp();
  if (!pop[field]) pop[field]=[];
  const idx = pop[field].indexOf(val);
  if (idx>=0) pop[field].splice(idx,1); else pop[field].push(val);
  saveCurrent(); render();
}

function removeFromArr(field, val) {
  const pop = cp();
  if (!pop[field]) return;
  const idx = pop[field].indexOf(val);
  if (idx>=0) { pop[field].splice(idx,1); saveCurrent(); render(); }
}

function addOtherToArr(field, inputId) {
  const el = document.getElementById(inputId);
  if (!el) return;
  const val = el.value.trim();
  if (!val) return;
  const pop = cp();
  if (!pop[field]) pop[field] = [];
  if (!pop[field].includes(val)) {
    pop[field].push(val);
    saveCurrent();
    el.value = '';
    render();
  } else {
    el.value = '';
  }
}

function removePopulation(i) {
  if (state.populations.length <= 1) {
    alert('You need at least one population. Use New Session to start over.');
    return;
  }
  const pop = state.populations[i];
  const name = pop.localLabel || pop.name || 'Population ' + (i+1);
  if (!confirm(`Remove "${name}"? This cannot be undone.`)) return;
  saveCurrent();
  state.populations.splice(i, 1);
  if (state.currentPopIndex >= state.populations.length) {
    state.currentPopIndex = state.populations.length - 1;
  }
  render();
}

function setSingle(field, val) {
  const pop = cp();
  pop[field] = (pop[field]===val)?'':val;
  saveCurrent(); render();
}

function setSensory(val) {
  const pop = cp();
  pop.isSensory = (pop.isSensory===val)?null:val;
  saveCurrent(); render();
}

function setSameSpecies(val) {
  saveCurrent();
  state.paper.sameSpecies = (state.paper.sameSpecies===val) ? null : val;
  render();
}

function toggleSharedSpecies(val) {
  if (!state.paper.sharedSpecies) state.paper.sharedSpecies = [];
  const idx = state.paper.sharedSpecies.indexOf(val);
  if (idx>=0) state.paper.sharedSpecies.splice(idx,1);
  else state.paper.sharedSpecies.push(val);
  render();
}

function setTextField(id, val) {
  const el = document.getElementById(id);
  if (el) el.value = val;
}

  if (!cp()[field]) cp()[field]=[];
  cp()[field].push({value:''});

}
function addPresetLoc(field, val) {

  render();
}
function removeLocEntry(field, i) {

  cp().molecularGroups.push({type:'gene', method:'', entries:[]});

}
function removeMolGroup(gi) {

}

function cc() { return colorClass(state.currentPopIndex); }


function navBtns(prev, next) {
  return `<div class="btn-row">
    <button class="btn btn-secondary" onclick="goSection('${prev}')">← Back</button>
    <button class="btn btn-primary"   onclick="goSection('${next}')">Continue →</button>
    ${state.populations.length>1?`<button class="btn btn-ghost" onclick="nextPop()">Next population →</button>`:''}
  </div>`;
}

function nextPop() {
  saveCurrent();
  state.currentPopIndex = (state.currentPopIndex+1) % state.populations.length;
  render();
}

function popNav() {
  if (state.populations.length<=1) return '';
  return `<div style="display:flex;gap:6px;margin-bottom:20px;flex-wrap:wrap;align-items:center;">
    ${state.populations.map((p,i)=>{
      const c = colorClass(i);
      return `<div class="chip ${i===state.currentPopIndex?'selected':''} ${c}" onclick="setPopulation(${i})">
        ${p.localLabel||p.name||'Pop '+(i+1)}
      </div>`;
    }).join('')}
    <div class="chip" onclick="addPopulation()" style="border-style:dashed">＋ new</div>
  </div>`;
}

function authorYear() {
  if (state.paper.firstAuthor && state.paper.year) {
    return state.paper.firstAuthor + state.paper.year;
  }
  const cit = state.paper.citation||'';
  const m = cit.match(/(\w+)\s+et\s+al\.\S*\s+(\d{4})/) || cit.match(/(\w+)[,\s]+(\d{4})/);
  return m ? m[1]+m[2] : '';
}

function e(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}


function buildRows() {
  const rows = [];
  const ay = authorYear();

  state.populations.forEach((pop, pi) => {
    const local  = pop.localLabel || pop.name || '';
    const region = pop.region || '';
    const spList = state.paper.sameSpecies===true
      ? state.paper.sharedSpecies
      : pop.species;
    const neuronIdBase = (pi+1) + ' ' + (local||('pop'+(pi+1)));

    const makeLabels = (sp) => {
      const parts = [region, local, sp].filter(Boolean);
      const base  = parts.join(' ');
      const suf   = ay ? ` (${ay})` : '';
      return { label: base+suf, pref: base+' neuron'+suf };
    };

    const labelTargets = spList.length ? spList : [''];

    rows.push({ _header: `Population ${pi+1}: ${local||'unnamed'}`, _cc: colorClass(pi) });

    // ── Build method sets for this population ──────────────────────────────
    // Each distinct method source gets a method set number.
    // Method sets:
    //   ms 1 — physiology (circuit role + functional type)
    //   ms 2 — fiber type (axon phenotype — separate method evidence)
    //   ms 3 — location / morphology
    //   ms 4+ — each molecular group in order
    // Administrative rows (labels, source, species) get methodSet = null.

    const methodSets = [];

    // ms 1: physiology
    const hasPhysiology = pop.isSensory===true || pop.physiology.length > 0;
    if (hasPhysiology) {
      methodSets.push({
        ms: 1,
        method: pop.physiologyMethod || '',
        rows: []  // filled below
      });
    }

    // ms 2: fiber type (own method)
    const hasFiber = pop.axonPhenotype.length > 0;
    if (hasFiber) {
      methodSets.push({
        ms: 2,
        method: pop.axonPhenotypeMethod || '',
        rows: []
      });
    }

    // ms 3: location / morphology
    const hasLocation = pop.somaLocation ||
      (pop.axonLocations||[]).some(x=>x.value) ||
      (pop.axonLeadingToSensory||[]).some(x=>x.value) ||
      (pop.sensoryTerminal||[]).some(x=>x.value) ||
      (pop.axonTerminal||[]).some(x=>x.value) ||
      pop.endingType.length > 0;
    if (hasLocation) {
      methodSets.push({
        ms: 3,
        method: pop.locationMethod || '',
        rows: []
      });
    }

    // ms 4+: one per molecular group
    (pop.molecularGroups||[]).forEach((g, gi) => {
      if ((g.entries||[]).some(en=>en.name)) {
        methodSets.push({
          ms: 4 + gi,
          method: g.method || '',
          type: g.type,
          group: g,
          rows: []
        });
      }
    });

    labelTargets.forEach(sp => {
      const neuronId = spList.length > 1 ? neuronIdBase+' ('+sp+')' : neuronIdBase;
      const { label, pref } = makeLabels(sp);

      // ── Administrative rows — no method set, no intersection ──────────────
      if (label) {
        rows.push({ neuronId, relationType:'label',           valueLabel:label,  npoProperty:'rdfs:label',          iri:'', methodSet:'', intersect:'', modifier:'', method:'' });
        rows.push({ neuronId, relationType:'preferred label', valueLabel:pref,   npoProperty:'skos:prefLabel',       iri:'', methodSet:'', intersect:'', modifier:'', method:'' });
        rows.push({ neuronId, relationType:'local label',     valueLabel:local,  npoProperty:'ilxtr:localLabel',     iri:'', methodSet:'', intersect:'', modifier:'', method:'' });
      }
      rows.push({ neuronId, relationType:'base class', valueLabel:'neuron', npoProperty:'ilxtr:neurondmBaseClass', iri:'', methodSet:'', intersect:'', modifier:'', method:'' });

      if (state.paper.citation||state.paper.doi) {
        rows.push({ neuronId, relationType:'source nomenclature', valueLabel:state.paper.citation, npoProperty:'ilxtr:literatureCitation', iri:state.paper.doi, methodSet:'', intersect:'', modifier:'', method:'' });
      }
      if (state.paper.dataAvailability) {
        rows.push({ neuronId, relationType:'Source Data', valueLabel:state.paper.citation, npoProperty:'ilxtr:dataCitation', iri:state.paper.dataAvailability, methodSet:'', intersect:'', modifier:'', method:'' });
      }
      if (sp) {
        const s = IRI.species[sp]||{};
        rows.push({ neuronId, relationType:'species', valueLabel:sp, npoProperty:s.npo||'ilxtr:hasInstanceInTaxon', iri:s.iri||'', methodSet:'', intersect:'', modifier:'', method:'' });
      }

      // ── Neurotransmitter — no method currently, attach to location set ────
      const ntRows = [];
      (pop.neurotransmitters||[]).forEach(n => {
        const s = IRI.neurotransmitter[n]||{};
        ntRows.push({ neuronId, relationType:'neurotransmitter', valueLabel:n, npoProperty:s.npo||'ilxtr:hasNeurotransmitterPhenotype', iri:s.iri||'', modifier:'', method:'' });
      });
      if (pop.ntOther) {
        ntRows.push({ neuronId, relationType:'neurotransmitter', valueLabel:pop.ntOther, npoProperty:'ilxtr:hasNeurotransmitterPhenotype', iri:'', modifier:'', method:'' });
      }

      // ── Write method sets ─────────────────────────────────────────────────
      methodSets.forEach(ms => {
        const msNum = ms.ms;

        // Method row — sits at top of this method set, intersection 1
        if (ms.method) {
          rows.push({
            neuronId, relationType:'method', valueLabel:ms.method,
            npoProperty:'ilxtr:derivedBy', iri:'',
            methodSet: msNum, intersect: 1,
            modifier:'', method: ms.method
          });
        }

        // ── MS 1: Physiology ────────────────────────────────────────────────
        if (msNum === 1) {
          if (pop.isSensory===true) {
            const s = IRI.circuitRole['sensory']||{};
            rows.push({ neuronId, relationType:'circuit role', valueLabel:'sensory', npoProperty:s.npo, iri:s.iri||'', methodSet:msNum, intersect:1, modifier:'', method:ms.method });
          }
          pop.physiology.forEach(r => {
            const s = IRI.physiology[r]||{};
            rows.push({ neuronId, relationType:'cutaneous physiology', valueLabel:r, npoProperty:s.npo||'', iri:s.iri||'', methodSet:msNum, intersect:1, modifier:'', method:ms.method });
          });
        }

        // ── MS 2: Fiber type ────────────────────────────────────────────────
        if (msNum === 2) {
          pop.axonPhenotype.forEach(r => {
            const s = IRI.axonPhenotype[r]||{};
            rows.push({ neuronId, relationType:'cutaneous physiology', valueLabel:r, npoProperty:s.npo||'ilxtr:hasAxonPhenotype', iri:s.iri||'', methodSet:msNum, intersect:1, modifier:'', method:ms.method });
          });
        }

        // ── MS 3: Location / morphology ─────────────────────────────────────
        if (msNum === 3) {
          if (pop.somaLocation) {
            const s = IRI.somaLocation[pop.somaLocation]||{};
            rows.push({ neuronId, relationType:'soma location', valueLabel:pop.somaLocation, npoProperty:s.npo||'ilxtr:hasSomaLocatedIn', iri:s.iri||'', methodSet:msNum, intersect:1, modifier:'', method:ms.method });
          }
          pop.endingType.forEach(r => {
            const s = IRI.endingType[r]||{};
            rows.push({ neuronId, relationType:'ending type', valueLabel:r, npoProperty:s.npo||'', iri:s.iri||'', methodSet:msNum, intersect:1, modifier:'', method:ms.method });
          });
          (pop.axonLocations||[]).filter(x=>x.value).forEach(x => {
            rows.push({ neuronId, relationType:'axon location', valueLabel:x.value, npoProperty:'ilxtr:hasAxon', iri:'', methodSet:msNum, intersect:1, modifier:'', method:ms.method });
          });
          (pop.axonLeadingToSensory||[]).filter(x=>x.value).forEach(x => {
            rows.push({ neuronId, relationType:'axon leading to sensory terminal', valueLabel:x.value, npoProperty:'ilxtr:hasAxonLeadingToSensoryTerminalIn', iri:'', methodSet:msNum, intersect:1, modifier:'', method:ms.method });
          });
          (pop.sensoryTerminal||[]).filter(x=>x.value).forEach(x => {
            const s = IRI.sensoryTerminal[x.value]||{};
            rows.push({ neuronId, relationType:'sensory terminal location', valueLabel:x.value, npoProperty:s.npo||'ilxtr:hasAxonSensorySubcellularElementIn', iri:s.iri||'', methodSet:msNum, intersect:1, modifier:'', method:ms.method });
          });
          (pop.axonTerminal||[]).filter(x=>x.value).forEach(x => {
            const s = IRI.axonTerminal[x.value]||{};
            rows.push({ neuronId, relationType:'axon terminal location', valueLabel:x.value, npoProperty:s.npo||'ilxtr:hasAxonTerminalIn', iri:s.iri||'', methodSet:msNum, intersect:1, modifier:'', method:ms.method });
          });
          // neurotransmitter attaches to location method set
          ntRows.forEach(r => {
            rows.push({ ...r, methodSet:msNum, intersect:1 });
          });
        }

        // ── MS 4+: Molecular groups ─────────────────────────────────────────
        if (msNum >= 4) {
          const g = ms.group;
          const validEntries = (g.entries||[]).filter(en=>en.name);
          const rel = g.type==='gene'?'marker genes':g.type==='protein'?'protein labeling':'cre line';
          const npo = g.type==='gene'?'ilxtr:hasNucleicAcidExpressionPhenotype':
                      g.type==='protein'?'ilxtr:hasProteinExpressionPhenotype':
                      'ilxtr:hasDriverExpressionConstitutivePhenotype';

          // Separate AND (constants) from OR (alternatives)
          const andEntries = validEntries.filter(en => !en.isOR);
          const orEntries  = validEntries.filter(en =>  en.isOR);

          // Intersection needed only if 2+ AND entries, or any OR entries exist
          const needsIntersect = andEntries.length > 1 || orEntries.length > 0;
          const intersectNum   = needsIntersect ? 1 : '';

          // AND entries — blank union, intersection only if needed
          andEntries.forEach(en => {
            rows.push({ neuronId, relationType:rel, valueLabel:en.name, npoProperty:npo, iri:'',
              methodSet:msNum, intersect:intersectNum, union:'',
              modifier:en.modifier||'', method:ms.method });
          });

          // OR entries — each gets its own union set number
          orEntries.forEach((en, oi) => {
            rows.push({ neuronId, relationType:rel, valueLabel:en.name, npoProperty:npo, iri:'',
              methodSet:msNum, intersect:intersectNum, union:oi,
              modifier:en.modifier||'', method:ms.method });
          });
        }
      });

      // ── Curator notes — no method set ────────────────────────────────────
      if (state.paper.figureNote) {
        rows.push({ neuronId, relationType:'Curator Note', valueLabel:state.paper.figureNote, npoProperty:'ilxtr:curatorNote', iri:'', methodSet:'', intersect:'', modifier:'', method:'' });
      }
      if (pop.populationNote) {
        rows.push({ neuronId, relationType:'Curator Note', valueLabel:pop.populationNote, npoProperty:'ilxtr:curatorNote', iri:'', methodSet:'', intersect:'', modifier:'', method:'' });
      }

    }); // end labelTargets
  });

  return rows;
}


// ═══════════════════════════════════════════════════════════
// EXPORT
// ═══════════════════════════════════════════════════════════
function exportXLSX() {
  const rows = buildRows().filter(r=>!r._header);
  const wsData = [
    ['npokb ID','Neuron ID','Relation Type','NPO Property','Union set number','Nest intersection number','Property Value Label','NPO Property Value IRI','Modifier','Proposed action','Method set number','Method']
  ];
  let lastNeuronId = '';
  rows.forEach(r => {
    const displayId = r.neuronId === lastNeuronId ? '' : r.neuronId;
    lastNeuronId = r.neuronId;
    wsData.push([
      '',                           // A: npokb ID
      displayId,                    // B: Neuron ID
      r.relationType,               // C: Relation Type
      r.npoProperty,                // D: NPO Property
      r.union   !== undefined && r.union   !== '' ? r.union   : '',  // E: Union set number
      r.intersect !== undefined && r.intersect !== '' ? r.intersect : '',  // F: Nest intersection number
      r.valueLabel,                 // G: Property Value Label
      r.iri||'',                    // H: NPO Property Value IRI
      r.modifier||'',               // I: Modifier
      '',                           // J: Proposed action
      r.methodSet !== undefined && r.methodSet !== '' ? r.methodSet : '',  // K: Method set number
      r.method||''                  // L: Method
    ]);
  });
  const wb = XLSX.utils.book_new();
  const ws = XLSX.utils.aoa_to_sheet(wsData);
  ws['!cols'] = [8,22,30,32,6,6,42,50,10,14,10,30].map(w=>({wch:w}));
  XLSX.utils.book_append_sheet(wb, ws, 'Annotations');
  XLSX.writeFile(wb, `cell_type_annotations_${new Date().toISOString().slice(0,10)}.xlsx`);
}


// ═══════════════════════════════════════════════════════════
// SESSION PERSISTENCE
// ═══════════════════════════════════════════════════════════

const LS_KEY = 'npo_survey_session';
const LS_META_KEY = 'npo_survey_session_meta';

function saveSession() {
  saveCurrent();
  try {
    const payload = JSON.stringify(state);
    // Save to localStorage as auto-backup
    localStorage.setItem(LS_KEY, payload);
    const meta = { savedAt: new Date().toISOString(), citation: state.paper.citation||'Untitled', pops: state.populations.length };
    localStorage.setItem(LS_META_KEY, JSON.stringify(meta));

    // Also trigger a file download
    const blob = new Blob([payload], { type: 'application/json' });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const safeName = (state.paper.firstAuthor||'session').replace(/[^a-zA-Z0-9]/g,'_');
    const dateStr  = new Date().toISOString().slice(0,10);
    a.href     = url;
    a.download = `npo_survey_${safeName}_${dateStr}.json`;
    a.click();
    URL.revokeObjectURL(url);

    setStatus(`✓ Saved — ${meta.pops} population${meta.pops!==1?'s':''}, ${dateStr}`, 'ok');
  } catch(err) {
    setStatus(`⚠ Save failed: ${err.message}`, 'err');
  }
}

function triggerLoadSession() {
  document.getElementById('session-file-input').click();
}

function loadSessionFile(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const loaded = JSON.parse(e.target.result);
      applySession(loaded);
      setStatus(`✓ Loaded "${loaded.paper?.citation||file.name}" — ${loaded.populations?.length||0} population(s)`, 'ok');
    } catch(err) {
      setStatus(`⚠ Could not load file: ${err.message}`, 'err');
    }
  };
  reader.readAsText(file);
  // reset so same file can be loaded again if needed
  event.target.value = '';
}

function applySession(loaded) {
  // merge loaded state safely
  state.paper       = loaded.paper       || state.paper;
  state.populations = loaded.populations || state.populations;
  state.currentSection   = loaded.currentSection   || 'paper';
  state.currentPopIndex  = loaded.currentPopIndex  || 0;
  // persist to localStorage too
  localStorage.setItem(LS_KEY, JSON.stringify(loaded));
  render();
}

function restoreFromLocal() {
  try {
    const raw = localStorage.getItem(LS_KEY);
    if (!raw) return;
    const loaded = JSON.parse(raw);
    applySession(loaded);
    hideBanner();
    const meta = JSON.parse(localStorage.getItem(LS_META_KEY)||'{}');
    setStatus(`✓ Restored "${meta.citation||'session'}" from ${(meta.savedAt||'').slice(0,10)}`, 'ok');
  } catch(err) {
    setStatus(`⚠ Could not restore: ${err.message}`, 'err');
  }
}

function dismissRestore() {
  hideBanner();
  localStorage.removeItem(LS_KEY);
  localStorage.removeItem(LS_META_KEY);
}

function hideBanner() {
  const b = document.getElementById('restore-banner');
  if (b) b.style.display = 'none';
}

function setStatus(msg, type) {
  const el = document.getElementById('session-status');
  if (!el) return;
  el.textContent = msg;
  el.className = 'session-status' + (type ? ' '+type : '');
  // clear after 6 seconds
  setTimeout(() => { if (el.textContent===msg) el.textContent=''; }, 6000);
}

// Auto-save to localStorage whenever navigating
const _origGoSection = goSection;
goSection = function(s) { _origGoSection(s); autoSaveLocal(); };
const _origSetPop = setPopulation;
setPopulation = function(i) { _origSetPop(i); autoSaveLocal(); };

function newSession() {
  const hasData = state.paper.citation || state.populations.some(p => p.name || p.localLabel);
  if (hasData) {
    const ok = window.confirm('Start a new session? Your current work will be lost unless you have saved it as a .json file.');
    if (!ok) return;
  }
  localStorage.removeItem(LS_KEY);
  localStorage.removeItem(LS_META_KEY);
  state = {
    currentSection: 'paper',
    currentPopIndex: 0,
    paper: { citation:'', doi:'', dataAvailability:'', figureNote:'', firstAuthor:'', year:'', sameSpecies:null, sharedSpecies:[] },
    populations: [newPop()],
  };
  hideBanner();
  setStatus('New session started', 'ok');
  render();
  window.scrollTo(0,0);
}

function autoSaveLocal() {
  try {
    const payload = JSON.stringify(state);
    localStorage.setItem(LS_KEY, payload);
    const meta = { savedAt: new Date().toISOString(), citation: state.paper.citation||'Untitled', pops: state.populations.length };
    localStorage.setItem(LS_META_KEY, JSON.stringify(meta));
  } catch(e) { /* storage full or unavailable — silent */ }
}

// ═══════════════════════════════════════════════════════════
// CROSSREF DOI LOOKUP
// ═══════════════════════════════════════════════════════════
async function lookupDOI() {
  const doiField = document.getElementById('f-doi');
  const statusEl = document.getElementById('doi-status');
  if (!doiField || !statusEl) return;

  let raw = doiField.value.trim();
  if (!raw) return;

  const doi = raw.replace(/^https?:\/\/doi\.org\//i, '').replace(/^doi:\s*/i, '');
  if (!doi) return;

  statusEl.textContent = '⏳ Looking up…';
  statusEl.style.color = 'var(--text2)';

  try {
    const res = await fetch(`https://api.crossref.org/works/${encodeURIComponent(doi)}`, {
      headers: { 'User-Agent': 'extractNPO/1.0 (mailto:curator@example.org)' }
    });
    if (!res.ok) throw new Error(`CrossRef returned ${res.status}`);
    const json = await res.json();
    const msg = json.message;

    const authors = msg.author || [];
    const firstAuthor = authors[0];
    const familyName = firstAuthor ? (firstAuthor.family || firstAuthor.name || '') : '';

    const dateParts =
      (msg['published-print']  && msg['published-print']['date-parts']?.[0]) ||
      (msg['published-online'] && msg['published-online']['date-parts']?.[0]) ||
      (msg['created']          && msg['created']['date-parts']?.[0]) || [];
    const year = dateParts[0] ? String(dateParts[0]) : '';

    const journal = (msg['container-title'] || [])[0] ||
                    (msg['short-container-title'] || [])[0] || '';

    const authorStr = authors.length > 1 ? `${familyName} et al.` : familyName;
    const citation  = [authorStr, journal, year].filter(Boolean).join(', ');
    const canonicalDoi = `https://doi.org/${doi}`;

    state.paper.doi         = canonicalDoi;
    state.paper.citation    = citation;
    state.paper.firstAuthor = familyName;
    state.paper.year        = year;

    doiField.value = canonicalDoi;
    const citField = document.getElementById('f-citation');
    if (citField) citField.value = citation;

    statusEl.textContent = `✓ ${authorStr}${year ? ', ' + year : ''} — ${journal || 'journal not found'}`;
    statusEl.style.color = 'var(--accent)';

  } catch (err) {
    statusEl.textContent = `⚠ Could not retrieve: ${err.message}. Type the citation manually.`;
    statusEl.style.color = 'var(--warn)';
  }
}

// ── INIT ──
(function init() {
  // Check for an existing localStorage session and offer to restore
  try {
    const raw  = localStorage.getItem(LS_KEY);
    const meta = JSON.parse(localStorage.getItem(LS_META_KEY)||'{}');
    if (raw) {
      const parsed = JSON.parse(raw);
      // Only show banner if there's meaningful data
      const hasCitation = parsed.paper?.citation;
      const hasPops     = parsed.populations?.some(p => p.name||p.localLabel);
      if (hasCitation || hasPops) {
        const banner = document.getElementById('restore-banner');
        if (banner) {
          const dateStr = (meta.savedAt||'').slice(0,10);
          const label   = meta.citation || 'previous session';
          banner.innerHTML = `<span>📂 <strong>Unsaved session found</strong> — "${label}"${dateStr?' ('+dateStr+')':''}, ${meta.pops||0} population(s)</span>
            <button class="session-btn primary" onclick="restoreFromLocal()">Restore</button>
            <button class="session-btn" onclick="dismissRestore()">Start fresh</button>`;
          banner.style.display = 'flex';
        }
      }
    }
  } catch(e) { /* localStorage unavailable */ }
  render();
})();
